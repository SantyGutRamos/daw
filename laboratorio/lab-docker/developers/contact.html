<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Desarrolladores UNSA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Contacto</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="webstandards.html">Estándares W3C</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contacto-seccion">
            <h2>Envíenos un mensaje</h2>
            <p>Si tienes alguna duda sobre nuestro despliegue en Docker, utiliza el siguiente formulario:</p>
            
            <form id="form-contacto" class="formulario-diseno">
                <div class="campo">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre aquí..." required>
                </div>

                <div class="campo">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@unsa.edu.pe" required>
                </div>

                <div class="campo">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje..." required></textarea>
                </div>

                <button type="submit" id="btn-enviar">Enviar Mensaje</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Escuela Profesional de Ingeniería de Sistemas - UNSA</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
