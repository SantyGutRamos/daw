<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor DOM Mejorado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">
        <h1>Editor de Texto</h1>

        <input type="text" id="entrada" placeholder="Escribe algo...">

        <p id="salida"></p>

        <button class="color" onclick="cambiarColor()">Color</button>
        <button class="limpiar" onclick="limpiarTexto()">Limpiar</button>
        <button class="modo" onclick="modoOscuro()">Modo Oscuro</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
